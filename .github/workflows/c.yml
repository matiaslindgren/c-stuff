name: build and test

on:
  push:
    branches: main
    paths-ignore:
      - '*.md'

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        llvm:
          - 21
        platform:
          - ubuntu-24.04
          - macos-26
        make:
          - build_type: debug
            trace: 1
          - build_type: asan
            trace: 0
          - build_type: ubsan
            trace: 0
          - build_type: msan
            trace: 0
          - build_type: fast
            trace: 0

    name: "runs-on=${{ matrix.platform }} build_type=${{ matrix.make.build_type }} trace=${{ matrix.make.trace }} llvm=${{ matrix.llvm }}"
    runs-on: ${{ matrix.platform }}
    env:
      STUFFLIB_TEST_VERBOSE: ${{ matrix.make.trace }}

    steps:
    - name: install linux dependencies
      if: ${{ startsWith(matrix.platform, 'ubuntu') }}
      run: |
        sudo apt update --yes && sudo apt install --yes libopenblas-dev
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo add-apt-repository --yes "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${{ matrix.llvm }} main"
        sudo add-apt-repository --yes "deb-src http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${{ matrix.llvm }} main"
        sudo apt update --yes && sudo apt install --yes clang-${{ matrix.llvm }} lld-${{ matrix.llvm }}

    - name: install macOS dependencies
      if: ${{ startsWith(matrix.platform, 'macos') }}
      run: |
        brew install coreutils llvm@${{ matrix.llvm }} lld@${{ matrix.llvm }}

    - uses: actions/checkout@v6
      name: checkout c-stuff git repo

    - run: make -j4 BUILD_TYPE=${{ matrix.make.build_type }} TRACE=${{ matrix.make.trace }} all
      name: build everything

    - run: make BUILD_TYPE=${{ matrix.make.build_type }} TRACE=${{ matrix.make.trace }} compile_commands.json
      name: make compile_commands.json

    - run: cat compile_commands.json

    - run: make BUILD_TYPE=${{ matrix.make.build_type }} TRACE=${{ matrix.make.trace }} test
      name: test

    - run: make BUILD_TYPE=${{ matrix.make.build_type }} TRACE=${{ matrix.make.trace }} integration_test
      name: integration test

    - run: make BUILD_TYPE=${{ matrix.make.build_type }} TRACE=${{ matrix.make.trace }} clean
      name: cleanup
